<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML 双向编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Live HTML Studio</p>
          <h1>HTML 编辑器</h1>
        </div>
        <p class="hint">在一个大编辑区里写完整 HTML，点击按钮在新窗口展开预览，打开后会持续同步。</p>
      </header>

      <main class="workspace">
        <section class="panel panel-editor">
          <div class="panel-head">
            <div>
              <h2>HTML 源码</h2>
              <p class="panel-tip">支持 Tab / Shift+Tab 缩进，Enter 保留当前行缩进。CSS 继续写在 HTML 里的 style 标签里。</p>
            </div>
            <div class="actions">
              <span id="previewStatus" class="status-pill">预览未打开</span>
              <button id="openPreviewBtn" class="button-secondary" type="button">打开预览窗口</button>
              <button id="refreshPreviewBtn" class="button-secondary" type="button">刷新预览</button>
              <button id="resetBtn" type="button">恢复示例</button>
            </div>
          </div>

          <label class="sr-only" for="codeInput">HTML 源码输入框</label>
          <div class="editor-shell">
            <pre id="lineNumbers" class="line-numbers" aria-hidden="true">1</pre>
            <div class="editor-main">
              <div id="currentLineHighlight" class="current-line-highlight" aria-hidden="true"></div>
              <textarea id="codeInput" spellcheck="false"></textarea>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
