<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML 双向编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Live HTML Studio</p>
          <h1>HTML 双向编辑器</h1>
        </div>
        <p class="hint">左边写源码，右边直接改预览，内容会双向同步。</p>
      </header>

      <main class="workspace">
        <section class="panel panel-code">
          <div class="panel-head">
            <h2>HTML 源码</h2>
            <button id="resetBtn" type="button">恢复示例</button>
          </div>
          <label class="sr-only" for="codeInput">HTML 源码输入框</label>
          <textarea id="codeInput" spellcheck="false"></textarea>
        </section>

        <section class="panel panel-preview">
          <div class="panel-head">
            <h2>实时预览</h2>
            <span>可直接编辑</span>
          </div>
          <iframe
            id="previewFrame"
            title="HTML 实时预览"
            sandbox="allow-scripts allow-same-origin"
          ></iframe>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
